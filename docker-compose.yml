# One-command local/demo deployment: `docker compose up --build`, then open
# http://localhost:8080. Offline by default; set LLM_PROVIDER + a key for cloud.
services:
  backend:
    build: ./backend
    environment:
      - LLM_PROVIDER=${LLM_PROVIDER:-local}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      # The frontend is served from :8080 below; allow that origin.
      - CORS_ALLOW_ORIGINS=${CORS_ALLOW_ORIGINS:-http://localhost:8080}
      - ENABLED_SOURCES=${ENABLED_SOURCES:-synthetic}
    expose:
      - "8000"

  frontend:
    build: ./frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
