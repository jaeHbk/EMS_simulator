name: ci

on:
  push:
    branches: [mainline]
  pull_request:
    branches: [mainline]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  fmt:
    name: cargo fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        run: rustup toolchain install stable --component rustfmt --profile minimal
      - run: cargo fmt --all -- --check

  clippy:
    name: cargo clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        run: rustup toolchain install stable --component clippy --profile minimal
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: cargo test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        run: rustup toolchain install stable --profile minimal
      - uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build --workspace --all-targets
      - name: Test
        run: cargo test --workspace

  determinism:
    name: deterministic golden-run smoke
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        run: rustup toolchain install stable --profile minimal
      - uses: Swatinem/rust-cache@v2
      - name: Build sim-server
        run: cargo build --release --package sim-server
      - name: Run twice and diff
        shell: bash
        run: |
          ./target/release/sim-server 250 > /tmp/run-a.tsv
          ./target/release/sim-server 250 > /tmp/run-b.tsv
          diff -u /tmp/run-a.tsv /tmp/run-b.tsv

  protocol-citations:
    name: every protocol entry has a source
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lint protocols for missing citations
        # Phase 0 placeholder. The protocols crate ships a real validator in
        # Phase 1. Until then, flag any YAML in data/protocols that lacks a
        # `sources:` block as a hard CI failure.
        shell: bash
        run: |
          shopt -s nullglob
          fail=0
          for f in data/protocols/*.yaml data/protocols/*.yml; do
            if ! grep -qE '^[[:space:]]*sources:' "$f"; then
              echo "::error file=$f::missing top-level 'sources:' block"
              fail=1
            fi
          done
          exit "$fail"
